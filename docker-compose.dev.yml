version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: chimaridata-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - chimaridata-network

volumes:
  redis-data:
    driver: local

networks:
  chimaridata-network:
    driver: bridge
